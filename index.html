}

/* ── HEADER ── */

  margin: 0 0 0 0;
  display: flex; align-items: center; gap: 14px;
  border-radius: 0;
}
.logo-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);

  flex-shrink: 0;
}
.logo-circle span { font-size: 8px; font-weight: 900; color: white; display: block; line-height: 1.2; }
.header-info { flex: 1; }
.header-title { font-size: 18px; font-weight: 800; color: white; letter-spacing: -0.3px; }
.header-sub { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.delivery-pill {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);

}

/* ── INFO BAR ── */
.info-bar {
  background: #0d1520; padding: 8px 20px; margin: 0;

/* ── PAGE ── */

/* ── STAT GRID ── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 0 0 10px; }
.stat-tile {

}
.stat-tile.acc-red   { border-top: 3px solid #CE1126; }
.stat-tile.acc-blue  { border-top: 3px solid #3b82f6; }
.stat-tile.acc-green { border-top: 3px solid #22c55e; }
.stat-tile.acc-org   { border-top: 3px solid #f59e0b; }

.stat-num.c-org   { color: #f59e0b; }
.stat-sub { font-size: 9px; color: #8ba3bc; }

/* ── CARD ── */
.card {
  background: #162032; border: 1px solid #243349; border-radius: 8px;
  overflow: hidden; margin: 0 0 10px;
}
.card-hdr {
  padding: 8px 16px; font-size: 8.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: #7b90ab;
  border-bottom: 1px solid #243349;
  display: flex; justify-content: space-between; align-items: center;
}
.card-hdr-right { font-size: 8px; font-weight: 600; color: #8ba3bc; text-transform: none; letter-spacing: 0; }

/* ── PROGRESS ── */

.prog-meta { display: flex; justify-content: space-between; margin-top: 5px; font-size: 9px; color: #8ba3bc; }

.ms-dt  { font-size:7px;   color:#334f6a; text-align:center; }

}
.vw-behind { background:rgba(239,68,68,0.1);  border:1px solid rgba(239,68,68,0.25); }
.vw-on     { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.25); }
.vw-ahead  { background:rgba(34,197,94,0.1);  border:1px solid rgba(34,197,94,0.25); }
.vw-pre    { background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.18); }

.vw-on     .v-dot { background:#3b82f6; }
.vw-ahead  .v-dot { background:#22c55e; }
.vw-pre    .v-dot { background:#3b82f6; }
.v-lbl { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.vw-behind .v-lbl { color:#ef4444; }
.vw-on     .v-lbl { color:#7dd3fc; }

.ph-bar-track { height:6px; background:#1e3050; border-radius:3px; overflow:hidden; }
.ph-bar { height:100%; border-radius:3px; min-width:3px; }
.pb-grn { background:#22c55e; }
.pb-org { background:#f59e0b; }
.pb-blu { background:#3b82f6; }
.pb-pur { background:#a855f7; }
.pb-yel { background:#eab308; }
.pb-gry { background:#94a3b8; }

.ph-note { font-size:8px; color:#8ba3bc; font-style:italic; margin-top:5px; }

/* ── PROJECT INFO ── */
.pi-grid { display:grid; grid-template-columns:1fr 1fr; padding:6px 0; }
.pi-cell { padding:7px 16px; border-bottom:1px solid #1a2a3d; }
.pi-grid > .pi-cell:nth-last-child(-n+2) { border-bottom:none; }
.pi-lbl { font-size:8.5px; color:#7b90ab; font-weight:600; margin-bottom:2px; }

.footer {
  background:#0a101a; border-top:1px solid #1a2a3d;
  padding:8px 20px; margin-top:4px;
  text-align:center; border-radius: 0 0 10px 10px;
}
.ft { font-size:8px; color:#3a5070; }

@media (max-width: 600px) {

  .two-col   { grid-template-columns: 1fr; }
  .stat-num  { font-size: 26px; }

  .stat-tile { padding: 10px; }
  .header-title { font-size: 13px; }

  .delivery-pill { display: none; }
  .info-bar { flex-wrap: wrap; gap: 4px; }
  .ib-sep   { display: none; }
  .week-badge { font-size: 8px; }
  .prog-pct { font-size: 16px; }

@media print {

  body { background:#0d1520 !important; }
  .page { padding:10px 0; }
}

// ============================================================
// RENDER ENGINE — DO NOT MODIFY
// ============================================================
document.addEventListener('DOMContentLoaded', () => {

  const today = new Date(); today.setHours(0,0,0,0);
  const toD = s => Math.round((new Date(s+'T00:00:00') - today)/86400000);
  const fmt = s => new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const weekNum = () => {
    const d = Math.floor((today - new Date(P.contractStart+'T00:00:00'))/86400000);
    return d < 0 ? 0 : Math.floor(d/7)+1;
  };

  // Header
  document.getElementById('h-logo').innerHTML = P.logoLines.map(l=>`<span>${l}</span>`).join('');
  document.getElementById('h-title').textContent = `${P.tenant} — ${P.project}`;
  document.getElementById('h-sub').textContent   = `${P.address}  |  ${P.storeNo}  |  ${P.center}`;
  document.getElementById('h-pill').textContent  = `Shell Delivery: ${fmt(P.certCompletion)}`;

  // Info bar
  document.getElementById('ib-ll').innerHTML    = `Landlord: <strong>${P.landlord}</strong>`;
  document.getElementById('ib-gc').innerHTML    = `GC: <strong>${P.gc}</strong>`;
  document.getElementById('ib-date').textContent= `Updated: ${today.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`;
  const wk = weekNum();
  document.getElementById('ib-week').textContent = wk<=0 ? 'Pre-Construction' : `Week ${wk} of ${P.totalWeeks}`;

  // Stats
  const dCC = toD(P.certCompletion);
  document.getElementById('st1').textContent  = dCC>0 ? dCC : '—';
  document.getElementById('st1s').textContent = `Target: ${fmt(P.certCompletion)}`;

  const dFR = toD('2026-05-22');
  document.getElementById('st2').textContent  = dFR>0 ? dFR : '—';
  document.getElementById('st2s').textContent = 'Structural start: 05/22/2026';

  document.getElementById('st3').textContent  = P.shellPct+'%';
  document.getElementById('st3s').textContent = `Day ${P.shellDayCur} of ${P.contractDays}`;

  const dCS = toD('2026-04-27');
  document.getElementById('st4').textContent  = dCS>0 ? dCS : '—';
  document.getElementById('st4s').textContent = 'Foundation pour: 04/27/2026';

  // Progress bar
  document.getElementById('pb-pct').textContent  = P.shellPct + '% Complete';
  document.getElementById('pb-fill').style.width = P.shellPct + '%';
  document.getElementById('pb-fill').className   = 'prog-fill '+(P.shellPct>0?'p-red':'p-dim');
  if (P.scheduledPct>0 && P.scheduledPct<100) {
    const t = document.getElementById('pb-tick');
    t.style.left='calc('+P.scheduledPct+'% - 1px)'; t.style.display='block';
  }
  document.getElementById('pb-day').textContent   = `Day ${P.shellDayCur} of ${P.contractDays}`;
  document.getElementById('pb-sched').textContent = `Baseline: ${P.scheduledPct}%`;

  // Milestones
  document.getElementById('milestones').innerHTML = P.milestones.map(m=>`
    <div class="ms-item">
      <div class="ms-dot ${m.status}"></div>
      <div class="ms-lbl">${m.label.replace(/\n/g,'<br>')}</div>
      <div class="ms-dt">${m.date}</div>
    </div>`).join('');

  // Variance
  const v=P.varianceDays, pre=P.shellDayCur===0&&v===0;
  let vc, vl, vd;
  if(pre)  { vc='vw-pre';    vl='PRE-CONSTRUCTION'; vd=`Construction starts ${fmt(P.contractStart)}`; }
  else if(v>2)  { vc='vw-ahead';  vl=`AHEAD OF SCHEDULE — ${v} DAYS`;         vd=`Actual ${P.shellPct}% vs. planned ${P.scheduledPct}%`; }
  else if(v<-2) { vc='vw-behind'; vl=`BEHIND SCHEDULE — ${Math.abs(v)} DAYS`; vd=`Actual ${P.shellPct}% vs. planned ${P.scheduledPct}%`; }
  else          { vc='vw-on';     vl='ON TRACK';                               vd=`Actual ${P.shellPct}% vs. planned ${P.scheduledPct}%`; }
  document.getElementById('vw').className        = 'variance-wrap '+vc;
  document.getElementById('v-lbl').textContent   = vl;
  document.getElementById('v-sep').textContent   = pre ? '' : ' | ';
  document.getElementById('v-dtl').textContent   = vd;

  // Key dates
  document.getElementById('key-dates').innerHTML = P.keyDates.map(d=>{
    const n = toD(d.date);
    const rhs = n<0
      ? `<div class="kd-done">✓</div>`
      : `<div class="kd-num" style="color:${d.color}">${n}</div><div class="kd-unit">days</div>`;
    return `<div class="kd-row">
      <div><div class="kd-name ${d.bold?'hi':''}">${d.label}</div><div class="kd-sub">${d.sub}</div></div>
      <div style="text-align:right">${rhs}</div>
    </div>`;
  }).join('');

  // Work items
  document.getElementById('tw-hdr').innerHTML =
    `<span>Work Completed This Week</span><span class="wk-badge green">${P.thisWeekLabel.toUpperCase()}</span>`;
  document.getElementById('tw-body').innerHTML = P.thisWeek.map(w=>`
    <div class="wi-row">
      <div class="wi-dot" style="background:${w.color}"></div>
      <div><div class="wi-text">${w.text}</div><span class="wi-tag">${w.tag}</span></div>
    </div>`).join('');

  document.getElementById('nw-hdr').innerHTML =
    `<span>Planned Work — Next 2 Weeks</span><span class="wk-badge blue">${P.nextWeeksLabel}</span>`;
  document.getElementById('nw-body').innerHTML = P.nextWeeks.map(w=>`
    <div class="wi-row">
      <div class="wi-dot" style="background:${w.color}"></div>
      <div><div class="wi-text">${w.text}</div><span class="wi-tag">${w.tag}</span></div>
    </div>`).join('');

  // Phases
  document.getElementById('phases').innerHTML = P.phases.map(ph=>`
    <div class="ph-block">
      <div class="ph-top">
        <div class="ph-name">${ph.name}</div>
        <div class="ph-right">
          <div class="ph-badge ${ph.badge}">${ph.badgeLabel}</div>
          <div class="ph-pct" style="color:${ph.pctColor}">${ph.pct}%</div>
        </div>
      </div>
      <div class="ph-meta">${ph.dates} &nbsp;|&nbsp; ${ph.scope}</div>
      <div class="ph-bar-track"><div class="ph-bar ${ph.pct>0?ph.barClass:'pb-dim'}" style="width:${Math.max(ph.pct,0)}%"></div></div>
      ${ph.note ? `<div class="ph-note">${ph.note}</div>` : ''}
    </div>`).join('');

  // Project info
  document.getElementById('proj-info').innerHTML = P.projectInfo.map(r=>`
    <div class="pi-cell"><div class="pi-lbl">${r.l1}</div><div class="pi-val">${r.v1}</div></div>
    <div class="pi-cell"><div class="pi-lbl">${r.l2}</div><div class="pi-val ${r.h2?'hi':''}">${r.v2}</div></div>
  `).join('');

  // Footer
  document.getElementById('ft').innerHTML =
    `${P.tenant} — ${P.project} &nbsp;|&nbsp; Weekly Construction Progress Dashboard &nbsp;|&nbsp; ${P.landlord} &nbsp;|&nbsp; Report generated ${today.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} &nbsp;|&nbsp; Countdowns update live`;
});
</script>
